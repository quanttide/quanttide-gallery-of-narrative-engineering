# 量潮叙事工程 · 风格模型
# 基于校园言情系列提炼

model:
  title: 校园轻甜
  description: 轻快的双向奔赴，学生气的直球暧昧。温柔、礼貌、明快。

dimensions:
  - title: 总体风格定位
    description: 走的是"误会→接触→心动→表白"的经典校园路线，情感明快不压抑。故事围绕善意和责任感展开——"你保护过我，这次换我保护你"。没有漫长的暗恋，没有沉重的十年，一切都正在发生。
    confidence: 0.90
    clues:
      - 以论坛风波开场，快速建立接触契机
      - 情感推动力来自善意和愧疚而非长久的压抑
      - 没有回忆闪回，全部是"现在进行时"

  - title: 叙事视角
    description: 第三人称全知为主，叙事者会直接评论人物心理。大量使用"她感觉""他愣愣地""她的脸似乎又红了一点"等直接心理描写。偶尔插入旁白注释，如"这是一种优雅的主动，将选择权递到他手中"，拉近了叙事者与读者的距离。
    confidence: 0.90
    clues:
      - "她感觉心跳平复下来，一种安稳的喜悦慢慢升起"——直接说情绪
      - "（她不再用疑问句'方便加吗'，而是直接陈述一个事实）"——旁白注释体
      - 叙事者不忌讳跳出来解读人物的行为动机

  - title: 时间结构
    description: 线性推进，没有回忆闪回。两章覆盖"加微信→吃饭→写声明"的短期叙事，时间跨度短，没有"十年"这类厚重的情感锚点。
    confidence: 0.85
    clues:
      - 第四章加微信，第五章吃火锅，实时推进
      - 没有倒叙、没有"二手文本"（日记/信件/照片）
      - 时间厚度弱，但节奏明快

  - title: 语言风格
    description: 句式活泼，大量口语和语气词——"啦""呀""呢""好""妙啊"高频出现。对话占比很高，推动情节和关系发展。旁白注释体类似剧本写法，在小说中有一定的间离感。整体偏轻快，没有"动作即语言"的克制手法。
    confidence: 0.85
    clues:
      - "好啦！我回去整理一下，发之前给你再看一遍。"——语气词丰富
      - "这位在危机公关方面是专业的新传人，请你开始表演吧。"——对话活泼
      - 没有颜文字，没有特别克制的留白
    contradictions:
      - 旁白注释体（括号说明文字）与纯小说叙事有风格张力

  - title: 情感表达
    description: 半直球路线——"让我请你吃顿饭吧？"这种欲说还休的写法介于含蓄和直白之间。心动通过微动作表达（"心尖像是被羽毛轻轻挠了一下""耳根微微发烫"），但最终靠对话摊开。没有长期的压抑和释放，心动就行动。
    confidence: 0.85
    clues:
      - "其实是想问'能不能加个微信方便答谢'，结果脑子一空，说出口就变成了'有缘再见'"——欲说还休
      - "上次在医院，你已经保护我一次了，所以这次该换我保护你啦。"——情感靠对话摊开
      - 没有递毛巾式的无声动作，情感通过语言表达

  - title: 细节美学
    description: 细节功能性较强，服务于情节推进而非情感承载。小猫表情包推动加微信、平板记录声明推动写声明、酸梅汤是饭桌道具。不像职场言情那样把细节变成反复出现的情感符号。
    confidence: 0.80
    clues:
      - 小猫探头的表情包——推动对话，但不反复出现
      - 酸梅汤——饭桌道具，不承载情感记忆
      - 暂无"星标相簿""白衬衣"这类跨场景复现的细节

  - title: 人物塑造
    description: 通过善意和责任感建立好感——"你保护过我，这次换我保护你"。两人都礼貌、温柔、为对方着想。没有复杂的内心挣扎，没有长期的压抑和自我怀疑。是校园式的纯真和体面。
    confidence: 0.85
    clues:
      - "可是你没有任何错啊"——双方都抢着承担
      - "我有点高估了我在学校的知名度"——带点自嘲的坦诚
      - 两人都没有深层的性格阴影

  - title: 叙事节奏
    description: 事件驱动。论坛风波→加微信→约饭→写声明，外部情节多于内心戏。节奏明快，没有大段的静态独白或环境描写。属于"接下来会发生什么"的情节悬念，而非"他什么时候才会说出来"的情感悬念。
    confidence: 0.85
    clues:
      - 第四章完成从帖子到加微信的全过程
      - 第五章完整覆盖一顿饭和一篇声明
      - 没有独立的独白段落

  - title: 流行文化嵌入
    description: 几乎无流行文化嵌入。"论坛""微信""表情包"作为叙事工具出现，不作为氛围染色剂。没有音乐、歌词、智能设备等元素。
    confidence: 0.90
    clues:
      - 论坛和微信是叙事工具，不是文化符号
      - 没有都智文、周杰伦、小爱同学等元素
      - 没有颜文字

  - title: 整体美学
    description: 温柔、礼貌、明快、学生气、事件驱动、半直球。不追求长时间的压抑与释放，而是在短时间跨度内通过对话和善意推进关系。
    confidence: 0.90
    clues:
      - 整部作品没有超过一周的时间跨度
      - 对话主导，情节推进快
      - 没有沉重的心理负担

examples:
  - paragraph: |-
      逸神："林栀同学，抱歉。我没想到随手发的帖子会引发这么多关注……希望没有给你带来困扰。"
      逸神："另外，你的脚踝……好些了吗？"
      林栀 看着屏幕上那句"一直惦记着"，心尖像是被羽毛轻轻挠了一下。
    dimension: 情感表达
    note: 半直球——"脚踝好些了吗"的关切里带着暧昧，不说破但能感受到

  - paragraph: |-
      林栀："其实是想问'能不能加个微信方便答谢'，结果脑子一空，说出口就变成了'有缘再见'……"
      林栀："所以，为了表达我的歉意和……嗯，还有正式的感谢，让我请你吃顿饭吧？"
      几乎是在消息变为已读的瞬间，他的回复就跳了出来。
      逸神："好！"
    dimension: 语言风格
    note: 欲说还休——"让我请你吃顿饭吧"是校园式的直球，但前面铺垫了一整段心理活动

  - paragraph: |-
      "论坛的声明我来写吧。"他开口了，"这次的风波是因为我的帖子而起，我应该对此负责的。"
      "可是你没有任何错啊。"她急忙打断了他，"这次风波从头到尾都没有任何人有错。"
    dimension: 人物塑造
    note: 双向善意——两人都抢着承担责任，这是校园式纯真的核心

  - paragraph: |-
      "这位在危机公关方面是专业的新传人，请你开始表演吧。"他笑着，一边给她又加满了酸梅汤。
      她的脸似乎又红了一点，"一份好的公关声明，要从准确定义事件的基调开始。"
    dimension: 叙事节奏
    note: 事件驱动——一顿饭的时间完成了从加微信到写声明的全过程，节奏明快

  - paragraph: |-
      "我…有点高估了我在学校的知名度，没想到你真的认不出我来…不过我也没认出你，我没想到我室友天天喊八百遍的校园偶像就是你…所以我们两个扯平啦。"
    dimension: 语言风格
    note: 口语化的自嘲——带点俏皮的坦诚，是校园青春特有的对话质感

  - paragraph: |-
      他急忙张口，"可…"
      她抬起头，"上次在医院，你已经保护我一次了，所以这次该换我保护你啦。"
      他愣愣地点了点头，"好。听你的。"
    dimension: 情感表达
    note: 直球——"该换我保护你"直接说出口，没有压抑，没有等待
