# 量潮叙事工程 · 母题模型
# 基于都市言情与校园言情共同母题提炼

title: 日常中的深情
description: 六个母题共同指向一个核心：爱不是被宣告的，而是在日常的缝隙中渗透出来的。无论都市还是校园，都在写"一个人被另一个人一寸一寸地靠近"。

motifs:
  - title: 手势先于语言
    description: 伸出去又缩回的手、掏口袋找纸巾、拿起毛巾擦头发、披上外套、拉进怀里——两本书共享同一套情感表达结构：身体比嘴巴更诚实，无意识的动作比任何告白都更有分量。都市的"毛巾"和校园的"纸巾"是同一只手势的两次浮现。
    weight: 10

  - title: 日常的缝隙
    description: 最动人的情感不发生在精心策划的场景里，而是在整理书桌、吃麻辣烫、等红绿灯、写一份声明的间隙中。两本书都不依赖戏剧冲突，而是在日常生活的褶皱里安放深情。
    weight: 9

  - title: 双向奔赴
    description: 没有第三者、没有误会、没有狗血——两本书都在写"我以为只有我一个人在等，原来你也在等我"的对称结构。都市用了十年的错位来制造悬念，校园用了论坛的公共空间来制造对视，但核心都是"双向"。
    weight: 9

  - title: 温和的善良人
    description: 人物普遍善良、礼貌、为对方着想。都市的林远亭深情但不苦情，陆知微勇敢但不逼迫；校园的窦逸负责但不霸道，林栀敏锐但不咄咄逼人。没有反派，没有恶人，冲突全部来自"不敢说"而非"不想给"。
    weight: 8

  - title: 旁观者的缺席与在场
    description: 都市言情没有旁观者——故事是封闭的二人系统，所有情感只能被彼此看见。校园言情则相反——论坛CP粉、闺蜜、室友构成了叙事的有机部分。两种处理方式不同，但构成了一枚硬币的两面：都市的孤独需要被一个人穿透，校园的暧昧需要被所有人见证。
    weight: 7

  - title: 时间的两种用法
    description: 都市言情用"十年"做情感的复利——沉默的时间本身成为爱的证据。校园言情没有时间跨度——发生在短短一周内，但事件密度很高。两种时间观共享同一个前提：重要的不是发生了多少事，而是发生了多久（或密度多大）。
    weight: 6
