# 量潮叙事工程 · 风格模型
# 基于《咖啡厅重逢》系列提炼

name: urban-romance
title: 克制浪漫
description: 克制的浪漫主义，日常的深情叙事。淡而有味，缓而有深。

dimensions:
  - title: 叙事母题与核心矛盾
    description: 小说表面写的是都市男女的相遇与情感，内核是"漫长的暗恋"与"迟到的双向奔赴"。不走浓烈狗血路线，不依赖激烈冲突，而是用细腻的日常细节、克制的情绪流露、以及时间维度上的厚重感打动读者。
    confidence: 0.95
    clues:
      - 小说表面写都市男女相遇，内核是漫长的暗恋与迟到的双向奔赴
      - 不走浓烈狗血路线，不依赖激烈冲突
      - 用细腻的日常细节、克制的情绪流露、时间维度上的厚重感打动读者
    boundary: |
      暗恋是底色但不是工具。不要在对话中通过"泄露他知道她的信息"来推进关系——
      那不是暗恋的暴露，是认知泄露。暗恋应该通过本能动作暴露，而非通过台词暴露。
    tensions:
      - 规则：暗恋的暴露需要通过"身体比脑子快"的动作（递毛巾→缩回），不能通过"我知道你的一切"的台词。
        判断标准：如果读者会问"他怎么知道？"——说明认知边界被突破了，这是越界不是暗恋暴露。
      - 规则：如果行为被解释为"这是他提前策划好的"——就突破了"深情但不心机"的边界。
        判断标准：行为必须是一时冲动后缩回，不能是精心计算后执行。

  - title: 叙事视角
    description: 第三人称限知，紧贴人物内心。关键场景切换视角（先写他的日记，再写她的思绪，最后交汇于偶遇），让读者同时看到两个人的内心，形成"双向暗恋"的错位与共鸣。叙事者很少跳出来评论，情感全部通过人物的言行、心理独白和细节呈现。
    confidence: 0.90
    clues:
      - 关键场景切换视角，咖啡厅重逢中先写他的日记、再写她的思绪、最后交汇于偶遇
      - 叙事者很少跳出来评论，情感通过言行、心理独白和细节呈现
    tensions:
      - 规则：限知视角为主，但在需要读者看到"他不知道她知道"的错位时，可以短暂跳至全知。
        判断标准：跳出视角的目的是让读者看到两人都在隐瞒，则可用。如果跳出只是为了省去写人物反应的麻烦——不可用。

  - title: 时间结构
    description: 不按线性推进，在当下场景中频繁闪回过去，核心锚点是"十年"。"十年"是反复出现的情感锚点，赋予短暂的相遇以厚重分量。回忆通过日记、信件、照片、朋友转述等"二手文本"承载，避免直接倒叙的生硬。
    confidence: 0.90
    clues:
      - 当下场景中频繁闪回过去：酒吧里回忆大四老乡会、咖啡厅里想起十年前
      - 通过日记、信件、照片、朋友转述等"二手文本"承载回忆
      - |-
        "十年"是反复出现的情感锚点
    boundary: |
      闪回必须被当下场景中的具体事物触发（一首歌、一个动作、一个味道）。
      不能凭空回忆——读者需要知道"是什么让他/她想起了那件事"。
    tensions:
      - 规则：每个闪回需要锚定在当下的感官触发上——看到水珠想起雨、听到歌想起那天。
        判断标准：回忆段落的第一句话是否包含一个具体的当下感官信号？如果没有——需要补。

  - title: 语言风格
    description: 句式偏短，少用冗长的复合句。用词日常化，不堆砌辞藻，但偶尔出现带文学色彩的句子。对话自然接近口语，剔除过多废话，保留耐人寻味的留白。一个独特手法是"动作即语言"——人物的修改动作本身揭示性格，比直接描写更有效。深情段落偏书面，互动段落偏轻快——这不是矛盾，而是有意为之的语调切换：颜文字、网络化表达、轻快的打闹让深情底色有了呼吸感，避免了全程压抑造成的审美疲劳。
    confidence: 0.85
    clues:
      - 句式偏短，少用冗长的复合句
      - 用词日常化，不堆砌辞藻，但偶尔出现文学色彩句子
      - |-
        "动作即语言"——一个词的修改动作本身揭示性格
      - 互动段落的颜文字和网络化表达是刻意的语调切换策略
    boundary: |
      文学色彩是偶尔的情绪提亮，不是常态。如果一个段落连续三句以上都在"写得很美"——
      过了。留一个呼吸口给日常语言。
    tensions:
      - 规则：文学色彩句子每段不超过一句。超过就变成了"这篇小说写得很用力"，不再是"日常的深情"。
        判断标准：连续两句带有比喻/拟人/抒情——删掉一句。

  - title: 情感表达
    description: 大部分时间情感是压住的——他暗恋十年不敢表白，她同样暗恋却也不敢走过去。关键节点情感释放，但不过度煽情，往往用动作或简短的重复代替长篇告白。最高级的情感藏在细微处：递毛巾、整理书桌、旁听会议——爱意不在台词里，在行为里。
    confidence: 0.90
    clues:
      - 大部分时间情感压住：他暗恋十年不敢表白
      - 关键节点释放但不过度煽情：动作或简短重复代替长篇告白
      - 最高级情感在细微处：递毛巾、整理书桌、旁听会议
    boundary: |
      克制不能变成预谋。他可以冲动地做一件事然后缩回去（递毛巾→缩回），
      但不能提前策划好每一步。策划意味着他不是一个"深情但不苦情"的人，
      而是一个"深情且心机"的人——这是性格的边界。
    tensions:
      - 规则：情感释放必须通过"不由自主"的行为，而非"精心准备"的行为。
        判断标准：这个行为需要内心独白解释动机吗？如果需要——行为本身不够自然，考虑让行为更本能而非补解释。
      - 规则：压抑期的情感暴露只能通过无意识的动作（看照片、发愣、下意识靠近）。
        判断标准：如果读者能明确说出"他这样做是因为喜欢她"而不是"他这样做可能是因为……"——暴露得太清楚了。

  - title: 细节美学
    description: 每一个重要情感节点都绑定一个具体的物或动作——果粒橙、白衬衣、焦糖玛奇朵、毛巾、行李箱、星标相簿、活页纸、软件设计稿、合照。这些细节不只是装饰，而是情感的载体，会在不同场景反复出现，形成内部呼应，成为情感符号。
    confidence: 0.90
    clues:
      - 每个重要情感节点都绑定具体物或动作：果粒橙、白衬衣、焦糖玛奇朵、星标相簿
      - 细节在不同场景反复出现，形成内部呼应
    boundary: |
      细节成为符号的前提是它在场景中有实际功能（擦头发需要毛巾、下雨需要伞），
      不是为了成为符号而被使用。如果一个细节的唯一功能是"呼应前文"——不要用。
    tensions:
      - 规则：同一个细节最多出现三次。第一次建立，第二次确认，第三次过度。
        判断标准：这个细节在当前位置是否同时具备场景功能和情感功能？如果只有情感功能——删。

  - title: 人物塑造
    description: 林远亭的核心性格通过修改日记的动作集中体现——对自己极度诚实、羞于自怜、连独处时都不肯夸大痛苦。他内向、压抑、有完美主义倾向，深情但不苦情，脆弱但有担当。陆知微同样深情，但更勇敢，最终走向他。两人有各自的事业和生活，暗恋只是他们人生的一部分，这反而让暗恋更真实。
    confidence: 0.85
    clues:
      - 林远亭：对自己极度诚实、羞于自怜、深情但不苦情
      - 陆知微：深情但更勇敢，"如果我当时走过去该多好"
      - 两人有各自的事业和生活，暗恋只是人生的一部分
    boundary: |
      林远亭在任何情境下都不能显得"擅长追求"或"擅长表达感情"——那违反了
      "十年暗恋却不敢表白"的基础设定。他可能冲动地做了一件事，但
      事后必须后悔或退缩。陆知微的勇敢不能变成"主动追求"——她的勇敢
      是"走向他"而不是"追到他"。
    tensions:
      - 规则：林远亭的情感表达上限是"做了一件出格的事然后缩回"，不能是"做了一件出格的事然后解释"。
        判断标准：他解释自己的行为吗？如果解释——太主动了，不是这个人物。

  - title: 对话模式
    description: 对话不是信息交换的工具，而是情感流动的管道。对话中大量嵌入动作指示——敲脑袋、递毛巾、放下杯子——真正的情感不在说了什么，而在说话前的手势和说话后的沉默。对白简短有弹性，靠谁在什么时候不说话了来推进情感。人物的修改动作（删掉一个词、换了一种说法）本身就是对白的一部分。
    confidence: 0.80
    clues:
      - 对话大量嵌入动作："他拍了拍她的脑袋说"、对话中间的停顿和视线游移
      - 关键表白场景的对话极其简短——"我喜欢你，我们在一起吧""好呀"
    boundary: |
      对话不能承担"推进关系"的功能——关系推进必须通过动作和沉默，
      不是通过话题。如果一轮对话结束后两人的关系状态变了——
      对话前发生了什么动作/沉默/停顿？如果没有——越界了。
    tensions:
      - 规则：情感转折点在动作和沉默里，不在台词里。
        判断标准：删掉这段对话后，场景的情感进展是否还在？如果不在——依赖台词推进了，需要补一个动作或沉默。

  - title: 叙事节奏
    description: 场景多为静态室内（酒吧、咖啡厅、书房），外部动作少，内心活动多。驱动故事的不是情节的突转，而是人物情绪的积累与释放——他写日记、她看消息、他们偶遇、她发现信。读者被吸引的方式是"想知道这十年到底发生了什么"和"他们什么时候才会说出口"，属于情感悬念而非情节悬念。
    confidence: 0.80
    clues:
      - 场景多为静态室内，外部动作少，内心活动多
      - 驱动故事的是情绪积累与释放，而非情节突转
      - 情感悬念替代情节悬念
    boundary: |
      情感悬念的驱动力是"他们什么时候靠近一步"，不是"他们之间发生了什么误会"。
      如果读者在读的时候期待的是"坏事要发生了"——走错了，应该期待的是"好事要发生了"。
    tensions:
      - 规则：每一步关系推进都需要读者能感受到"他终于鼓起勇气"而非"他突然变了一个人"。
        判断标准：这个行为在前一章的人物状态中是否有合理前因？如果没有——加速了，加一场过渡。

  - title: 时代质感
    description: 作品的叙事语言和细节中自然嵌入了九零后/零零后的时代印记——不是硬广，而是氛围的染色剂。分为两个子信号：（1）时代标记——小爱同学、创业黑话（"皮包公司""草台班子"）、社交媒体互动；（2）音乐作为情感坐标——周杰伦歌词、都智文《夜与昼》在关键场景中出现，歌曲替人物说出说不出口的话。
    confidence: 0.70
    clues:
      - 周杰伦歌词、都智文《夜与昼》、小爱同学
      - |-
        "皮包公司""草台班子"——这一代创业者的自我解嘲
      - 颜文字和网络用语增强都市感
    boundary: |
      时代元素必须自然嵌入场景需求（放音乐是因为想听、用App是因为需要联系），
      不是展示"这是一部现代小说"。如果去掉这个元素场景逻辑不受影响——不要用。
    tensions:
      - 规则：每个时代元素必须同时具备场景功能，不能只有"标识时代"一个功能。
        判断标准：换成通用的替代品（"放了一首歌"而非歌词、"发了一条消息"而非App名）是否影响场景表现力？
        不影响——太刻意了。

  - title: 美学关键词
    description: 十个关键词贯穿所有场景和人物行为：克制、深情、细节、时间、双向、遗憾、陪伴、日常、温柔、诚实。
    confidence: 0.95
    clues:
      - 十个关键词贯穿所有场景和人物行为
    boundary: |
      每个关键词都有反面：
      - 克制不是冷漠——他克制地接近不是不接近
      - 深情不是沉重——深情需要日常的轻盈感来平衡
      - 日常不是无聊——日常是深情的容器，不是填充物
      - 温柔不是软弱——温柔地做决定，不是温柔地不决定
      - 遗憾不是停滞——遗憾是对过去的感受，不是对现在的放弃

relational_stages:
  - stage: 陌生人伪装期
    chapters: [1_1, 1_2]
    active_constraints:
      - 不能暴露"我知道你"
      - 可以靠近（身体先于理性）但不能解释（为什么靠近）
      - 只能通过本能动作表达情感，不能通过台词
    relaxed_constraints: []

  - stage: 试探期
    chapters: [2_1, 2_3, 4_1, 4_2, 4_3, 6_2]
    active_constraints:
      - 不能暴露"我记得你十年了"
      - 可以试探（“好巧啊”），但不能确认（“我是为你来的”）
      - 可以聊心事，但不能聊"对你的心事"
    relaxed_constraints:
      - 情感表达可以更直接（捏肩、拉手腕）

  - stage: 确认前夜
    chapters: [7_2, 8_2]
    active_constraints:
      - 拥抱可以说"以后我陪你"但仍不能说"我喜欢你"——台词边界直到最后才放开
      - 动作可以完全越界，台词仍需要克制
    relaxed_constraints:
      - 所有身体边界放开（拥抱、拉手奔跑）
      - 可以用动作表达任何情感

  - stage: 亲密期
    chapters: [9_1, 10_1, 10_2, 10_3]
    active_constraints: []
    relaxed_constraints:
      - 所有约束放开，回归日常叙事即可
      - 唯一保留：即使现在是恋人，回忆十年前时仍需保持那一阶段的语气

excerpts:
  - paragraph: |-
      她想要推门的手顿住了。真的是他。
      滑轮的声音摩擦着地面。她轻轻推开了咖啡店的门。
      听到门口的声响，他本能地转过头。
      看到眼前窈窕的身影，他愣住了。
      不是梦。
    dimension: 叙事母题与核心矛盾
    note: 重逢是漫长的暗恋与迟到的双向奔赴的物理交会点——门的推开与愣住的眼神在一瞬间完成了十年的跨度

  - paragraph: |-
      她想要推门的手顿住了。真的是他。
      滑轮的声音摩擦着地面。她轻轻推开了咖啡店的门。
      听到门口的声响，他本能地转过头。
      看到眼前窈窕的身影，他愣住了。
      不是梦。
    dimension: 叙事视角
    note: 双视角交替——先写她的手，再写他的眼，最后交汇于门口重逢的一刻

  - paragraph: |-
      那是他存了十年的照片。
      他看着窗外时下时停的雨。透过去，他看到了十年前自己在雨中见过的她的背影。
    dimension: 时间结构
    note: 一张照片、一场雨，连接两个时空——"十年"的具象化

  - paragraph: |-
      他删掉了"从没有人"，换成了"少有人"。
      就这一个词的改动，他反复看了三遍。
      然后合上日记本，把它放回书架最上层。
    dimension: 语言风格
    note: 动作即语言——一个词的修改动作本身成为人物性格的集中揭示

  - paragraph: |-
      "那你什么时候把他们都忘掉，只当我一个人的苹果？"
      他的眉头舒展开了。
      "你说的对！"
      "我什么都没说啊？"她貌似困惑地问。
      他拍了拍她的脑袋，"谢谢你哦(´-ω-`)"。
    dimension: 语言风格
    note: 互动段落的轻快弹性——"苹果"的隐喻和颜文字的穿插，在深情基调中透出日常感。这是有意为之的语调切换

  - paragraph: |-
      他看了看她湿漉漉的头发，从书包里掏出刚在超市买的毛巾。
      不知不觉间，他的手已经伸了出去，轻轻地擦了擦她的头发。
      擦了两下，他回过神来。赶忙停下来，把毛巾递给她。
    dimension: 情感表达
    note: 爱意不在台词里，在行为里——递毛巾的动作比任何告白都更有分量

  - paragraph: |-
      "黑心资本家！"，她说，"这么多问题，我看着都头大，更不要说他们了。"
      他拍了拍她的脑袋，"黑心资本家说我是黑心资本家啊！"说着又敲了些。
      她却有点感伤，"你在他们那么大的时候也像他们那样拼命吗？"
      ...
      "我也知道他们刻苦。我只是很心疼他们，这么小的年纪就要经历这么大的风暴。"她说，"可他们还有你，我更心疼在他们的年纪在风暴中孤独无助的你。如果我当时走过去该多好..."
      他的眼眶湿润，把她揽入怀中。
    dimension: 情感表达
    note: 情感在对话中层层递进——从打闹到心疼，"如果我当时走过去该多好"是最柔软的一句

  - paragraph: |-
      她不小心碰掉了一沓活页纸，赶忙蹲下身收拾起来。
      大部分的活页纸都是她看不懂的软件设计稿，画满了各种抽象的线条。
      有一张活页纸是密密麻麻的字，她忍不住拿出来看了一眼。是一封关于她的信。

      19岁的我，

      你好啊！我是29岁的我。
      没想到会以这种方式与你对话。
      ...
      转眼间已经十年了。这条路我已经独自走了十年，于我却不觉得孤独。
      可我还是最想要她的陪伴。

      看着戛然而止的信，她的眼眸里闪烁着点点泪光。她知道她从来都不是一个人在默默守望。
    dimension: 细节美学
    note: 活页纸这个细节成为情感的载体——软件设计稿和信的并置，展现一个人精神的AB面

  - paragraph: |-
      他打开相册看了看她的照片。这些年，他每过一段时间都会收集一些她的照片，所以并不吃惊她的变化。
      当面看到还是和照片里不一样。
      雨天的她有点狼狈。鬼使神差地递毛巾的时候，回过神来又害怕自己越界。好在她没有拒绝。
      她的行李箱是粉色的。似乎还是当年那个小女生。
      她的眼睛还是亮晶晶的，让人看到就忍不住想陷进去。
    dimension: 细节美学
    note: 行李箱是粉色的、眼睛还是亮晶晶的——细节承载情感，"还是"这个词泄露了十年的注视

  - paragraph: |-
      我也不知道该怎么和别人建立联系了。
      也或者是我想而不得吧。大家都有自己的世界，只有我身处一个人的世界里没有人可以说话。就好像这个世界渐渐把我忘记了一样。
      我很难过。当我想找谁说说我的难过的时候，我发现我不知道找谁说，也说不出来，就更难过了。
    dimension: 人物塑造
    note: 林远亭的自白——展示脆弱但不自怜，深情但不苦情的性格核心

  - paragraph: |-
      "林总您到了！我刚接待完陆总，马上就来接您。"
      陆知微听到了"林总"两个字，心下一紧。
      ...
      一边下楼，王助理一边给她老公发消息，"有大瓜！陆总似乎对林总有意思！他们两个是双箭头！"
      她说的太兴奋，没注意林远亭已经走了过来。
    dimension: 叙事视角
    note: 通过第三方视角投射主角心意——王助理的吃瓜视角让双向暗恋显影

  - paragraph: |-
      "黑心资本家！"，她说，"这么多问题，我看着都头大，更不要说他们了。"
      他拍了拍她的脑袋，"黑心资本家说我是黑心资本家啊！"说着又敲了些。
      她却有点感伤，"你在他们那么大的时候也像他们那样拼命吗？"
    dimension: 对话模式
    note: 对话中嵌入动作——"拍了拍她的脑袋"在说"资本家"的同时发生了亲密接触，动作与言语形成双声道

  - paragraph: |-
      她怔怔地看着他拉着自己的手。
      灯光下的那道影子，是贯穿了一整个青春里的身影啊。
      她想这样，一直一直地，被他拉着，跑完这条永远没有尽头的路。
      三十岁的他们，好像一对二十岁的年轻人。
    dimension: 叙事节奏
    note: 情绪积累后的释放——海边奔跑的场景，慢节奏里的瞬间爆发，情感悬念落地

  - paragraph: |-
      "我想外公了。不知道他是天上的哪颗星星呢。"
      ...
      "一个想着要延续千年的皮包公司，真的好好笑哈哈哈哈。"
      "是啊，在我们的父母眼里，我们改变世界的工具，或许只是个草台班子。"她凝望着窗外的路灯，"但是这份吐槽着支持的爱，是独属于人类而不属于 AI 的不合理，是可以穿越千年的闪耀星光。"
    dimension: 时代质感
    note: 日常话题中自然带出时代烙印——"皮包公司""草台班子"是这一代创业者的自我解嘲

  - paragraph: |-
      她扑进他怀里轻轻捶他，"坏蛋！坏蛋！坏蛋！"
      他拍着她哄，"我是坏蛋，我是坏蛋。刚才我助理通知我说有个产品会议让我跟，陪我听个会好不好？"
      她点点头，又蹭了蹭他的脖子。
      他搬开电脑前的椅子，把她放在腿上，"今天只用旁听，我们摸鱼就行。"
      "小爱同学，播放都智文的《夜与昼》。"
      智能音箱回答，"好的，正在为您播放会员音乐歌曲，刘至佳等的《夜与昼》。"
    dimension: 时代质感
    note: 小爱同学和都智文的歌有机嵌入日常场景，不是硬广，是氛围的染色剂

  - paragraph: |-
      他看了看她湿漉漉的头发，从书包里掏出刚在超市买的毛巾。
      不知不觉间，他的手已经伸了出去，轻轻地擦了擦她的头发。
      擦了两下，他回过神来。赶忙停下来，把毛巾递给她。
      她接过来，低着头擦了擦。雨天的她有点狼狈。
      她的行李箱是粉色的。似乎还是当年那个小女生。
      她的眼睛还是亮晶晶的，让人看到就忍不住想陷进去。
    dimension: 美学关键词
    note: 一段文字同时携带克制（伸出去又缩回）、深情（超市特意买的毛巾）、细节（粉色行李箱、亮晶晶的眼睛）、日常（便利店场景）——四个关键词自然交织

negative_excerpts:
  - paragraph: |-
      "焦糖玛奇朵？我记得你爱喝这个。"
      他脱口而出，说完才意识到自己说了什么。
      她愣了一下——他怎么知道的？
    boundary_violated: 情感表达——认知边界
    reason: |
      作为一个刚见面的人，他不应该知道她的饮品偏好。
      这句台词在第一轮对话就暴露了他知道她，导致后续所有"他到底认不认识我"的张力全部消失。
    instead: |
      改成他问她"喝什么"，她说"焦糖玛奇朵吧"，他说"好巧，我也喜欢"——
      巧合比预知更符合"命中注定"的审美。

  - paragraph: |-
      他从书包里拿出那条毛巾。
      是上个月在超市买的，一直揣在包里，想着哪天遇到她就递给她。
    boundary_violated: 情感表达——预谋 vs 本能
    reason: |
      林远亭的性格特征是"深情但不苦情""冲动然后缩回"。
      提前准备毛巾意味着他在策划相遇后的每一步，这让他从一个
      "被暗恋驱使的笨拙的人"变成了"精心设计相遇的心机的人"。
      方向错了。
    instead: |
      保留原文"从书包里掏出刚在超市买的毛巾"——刚买的是偶发的，不是策划的。
      去掉一切"早就准备好了"的解释。

  - paragraph: |-
      "你一个人，太苦了。以后让我来照顾你吧。"
    boundary_violated: 对话模式——台词推进关系
    reason: |
      关系推进必须通过动作和沉默，不是通过台词。
      这句话把所有应该由行为承载的情感重量压在了对话上。
    instead: |
      改成她抱住他，说"以后我陪你"——动作先于语言，"陪"比"照顾"轻，但更有力。

  - paragraph: |-
      他又在凌晨三点醒来。
      打开那个存了十年的相册，指尖划过屏幕上一张张她的脸。
      他想起第一次见到她的那天——
      阳光正好，她穿着白色的连衣裙站在人群中。
      他想，如果那天他走了过去，现在一切会不会不一样。
    boundary_violated: 时间结构——无触发的闪回
    reason: |
      回忆没有锚定在当下的感官信号上——为什么是今天？
      为什么是凌晨三点？前面的行为是什么触发了他看照片？
    instead: |
      在"凌晨三点醒来"和"打开相册"之间加一个触发：
      "手机弹出一条消息提示——是她两小时前发的朋友圈。
      他点开，看到她的照片，然后忍不住往下翻了翻。"