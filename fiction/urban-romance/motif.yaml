# 量潮叙事工程 · 母题模型
# 基于都市言情「克制浪漫」风格提炼

name: urban-romance
title: 克制浪漫
description: 贯穿全书的反复出现的情感符号与叙事模式。

motifs:
  - name: 十年
    description: 核心时间母题。"喜欢了十年"在酒吧、咖啡厅、书房、海边等场景反复出现。
    weight: 10
    scenes: [酒吧, 咖啡厅, 书房, 海边, 深夜失眠, 阳台]
    note: 每一年的沉默都为最终的表白增加当量。不是"突然爱上"，是"爱了很久"。

  - name: 手势
    description: 全书最高级的情感表达不在台词里，在手里。递毛巾、捏肩、拉手腕、拥抱、擦眼泪——每个手势都是情感的微小爆破，在不该触碰的时候触碰，反应先于理性。
    weight: 9
    scenes: [咖啡厅, 便利店, 海边, 公园拥抱, 阳台, 深夜失眠]
    note: 毛巾是全书最有力的单一手势实例。从超市特意买的、揣在包里、"不知不觉"伸出去、"擦"比"递"更亲密——一个物件承载关切、犹豫、越界、回味四个阶段。

  - name: 雨
    description: 天气作为命运干涉的隐喻。咖啡厅重逢、便利店闲坐、夜市约会——每一次重要相遇都发生在雨中或雨后。
    weight: 7
    scenes: [咖啡厅, 便利店, 夜市, 阳台]
    note: 雨制造偶然性。没有雨，他们不会在咖啡厅相遇；没有雨，她不会去便利店找他。雨是叙事者伪装成天气的命运之手。

  - name: 创业者的孤独
    description: 他的孤独不仅是"暗恋十年"，更是"独自扛了十年"的创始人。便利店的海聊、海边的自白、书房里的"黑心资本家"互怼——职业身份不是装饰，是性格的一部分。
    weight: 7
    scenes: [便利店, 海边, 书房, 小龙虾, 阳台]
    note: 她心疼的不仅是"喜欢了十年的人"，更是"在风暴中孤独无助的你"。这才让深情男不空洞。

  - name: 歌声
    description: 特定歌曲标记特定场景的情感浓度。都智文《夜与昼》在书房、Falling You 在阳台，歌词替人物说出说不出口的话。
    weight: 5
    scenes: [书房, 阳台]
    note: 叙事者借来的声带。出现次数少但载荷高。
