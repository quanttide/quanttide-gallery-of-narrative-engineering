# 量潮叙事工程 · 母题模型
# 基于都市言情「克制浪漫」风格提炼

title: 克制浪漫
description: 贯穿全书的反复出现的情感符号与叙事模式。

motifs:
  - title: 十年
    description: 核心时间母题。"喜欢了十年"覆盖全书 6 个场景，从咖啡厅的遥望到酒吧的表白。每一年的沉默都为最终的表白增加当量——不是"突然爱上"，是"爱了很久"。
    weight: 10

  - title: 手势
    description: 全书最高级的情感表达不在台词里，在手里。递毛巾、捏肩、拉手腕、拥抱、擦眼泪——每个手势都是情感的微小爆破。毛巾是最有力的实例：从超市特意买的、揣在包里、"不知不觉"伸出去，一个物件承载关切、犹豫、越界、回味四个阶段。
    weight: 9

  - title: 雨
    description: 天气作为命运干涉的隐喻。全书四次重要情感场景都发生在雨中或雨后——咖啡厅重逢、便利店闲坐、夜市约会。雨制造偶然性：没有雨他们不会相遇。叙事者伪装成天气的命运之手。
    weight: 7

  - title: 创业者的孤独
    description: 他的孤独不仅是"暗恋十年"，更是"独自扛了十年"的创始人。便利店的海聊、海边的自白、书房里的互怼——职业身份不是装饰。她心疼的不仅是"喜欢了十年的人"，更是"在风暴中孤独无助的你"。
    weight: 7

  - title: 歌声
    description: 特定歌曲标记特定场景的情感浓度。都智文《夜与昼》在书房、Falling You 在阳台——歌词替人物说出说不出口的话。仅出现在两处但载荷极高。
    weight: 5
