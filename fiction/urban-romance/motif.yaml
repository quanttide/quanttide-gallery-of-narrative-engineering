# 量潮叙事工程 · 母题模型
# 基于都市言情「克制浪漫」风格提炼

title: 连接障碍
description: 五个母题共同指向一个核心——故事讲的不是"爱情"，而是"连接障碍"。每个母题都在描述"靠近"的方式：一个把自己封闭得很好的人，被另一个人一寸一寸地靠近。

motifs:
  - title: 十年
    description: 核心时间母题。"喜欢了十年"覆盖全书多个场景，从咖啡厅的遥望到酒吧的表白。每一年的沉默都为最终的表白增加当量——不是"突然爱上"，是"爱了很久"。
    weight: 10
    clues:
      - 1_1 日记："哪有人暗恋一个人，十年了才告诉其他人有这么回事的"
      - 1_2 凌晨看照片："不枉我喜欢了她那么多年"
      - 4_1 便利店："当了十年以后越来越难"
      - 10_1 信："转眼间已经十年了。这条路我已经独自走了十年"
      - 8_2 酒吧："喜欢，很喜欢，喜欢了十年。喜欢地想要发疯"
    tensions:
      - "十年"是结构性母题，几乎出现在每个关键场景。但它不是均匀分布的——1_1、10_1、8_2 是高峰，4_1、6_2 是弱引用。如果在过渡场景（4_2 夜市、9_1 火锅）强行塞入"十年"，会破坏日常生活场景的轻盈感。

  - title: 手势
    description: 全书最高级的情感表达不在台词里，在手里。每个手势都是情感的微小爆破。
    weight: 9
    clues:
      - 1_1 咖啡厅：掏出刚在超市买的毛巾，不知不觉伸出去擦她的头发，回过神来赶紧停下
      - 4_1 便利店：她伸手捏他的肩，他闭上眼睛感受——"她的手好软好细啊"
      - 6_2 海边：他突然拽起她的手腕向前跑去
      - 7_2 公园：她抱住他，他身体僵直，然后手慢慢抬起来抱住了她
      - 8_2 酒吧：无（唯一没有明确手势的高潮场景——因为对话终于走到了前面）
    tensions:
      - 手势母题在 8_2（酒吧表白）缺位——这是有意的。全书的情感表达模式在最后一个场景发生了切换：动作终于让位给了语言。如果在 8_2 强行加入一个手势，会削弱"十年沉默终于被言语打破"的叙事力量。
      - 校园言情中的"随身携带的温柔"（纸巾擦眼泪、披外套）与都市的"手势"是同一母题的跨作品变体。两者共享的动作结构（准备→不由自主→回过神来→退缩/继续）一致，但物理载体不同。

  - title: 雨
    description: 天气作为命运干涉的隐喻。雨制造偶然性——没有雨他们不会相遇。叙事者伪装成天气的命运之手。
    weight: 7
    clues:
      - 1_1 咖啡厅：春天工作日下午，淅淅沥沥的小雨。她扛不住暴雨找地方避雨。
      - 1_2 失眠："雨天的她有点狼狈"
      - 4_1 便利店：雨夜，他从便利店窗口看雨丝穿过路灯。她冒雨赶来，合上潮湿的伞。
      - 4_2 夜市："春天的雨夜过后，夜市的人流量比平常少了很多"
    tensions:
      - 雨在 1_1~4_2 密集出现后，6_2~10_3 几乎完全消失。后半段的情感推进不再依赖天气作为中介——人物自己走进了彼此的生活，不需要命运之手了。这是一种有意的退场。
      - 雨在初稿 1_1 中是"她偶然避雨→恰好遇到他"，成稿改为"她收到消息后刻意前往→恰好下雨"。雨从"相遇的原因"降级为"相遇的氛围"，偶然性的来源从天气转移到了人物的主动选择。

  - title: 孤独
    description: 他的孤独不仅是"暗恋十年"，更是"独自扛了十年"的创业者。职业身份不是装饰——她心疼的不仅是"喜欢了十年的人"，更是"在风暴中孤独无助的你"。
    weight: 7
    clues:
      - 4_1 便利店："只有 AI 们还可以说一说心里话，其他人都没法说。都是一群找不到人类说话的可怜人。"
      - 6_2 海边："这些年我越来越习惯一个人。大家都有自己的世界，只有我身处一个人的世界里没有人可以说话。"
      - 7_2 公园："我原来挺爱哭的。可我都不记得上次哭是什么时候了。我哭不出来了，什么都堵着。"
      - 10_1 信："求求上天看看我这份渴望吧。其实我知道应该走出来这一句。可我不能。"
    tensions:
      - 孤独的消解不是线性的。6_2 海边他第一次完整表达孤独，7_2 公园她说"以后我陪你"，但 10_1 的信里他仍然在写"求求上天"——说明孤独在关系中不是一次性解决，而是反复回潮。p07 的实验也验证了这一点：孤独作为分析性概念不可直接作为生成约束，它需要在具体的行为和场景中"被体现"而非"被陈述"。
      - 校园言情几乎没有孤独母题——因为校园的时间跨度只有一周，事件密度极高，孤独被"旁观者"母题（CP粉、室友、闺蜜）完全覆盖。两个系列的孤独/旁观者是同一枚硬币的两面。

  - title: 歌声
    description: 特定歌曲标记特定场景的情感浓度。歌词替人物说出说不出口的话。仅出现在两处但载荷极高。
    weight: 5
    clues:
      - 10_1 书房："小爱同学，播放都智文的《夜与昼》。"——音箱随后唱出："原来我曾有过裂口，等你照亮我的宇宙。"
      - 10_3 阳台：音响传来《Falling You》——"难道让时间倒流，世界尽头，要陪在你左右。"
    tensions:
      - 歌声是点缀性母题（weight=5），不是结构性母题。它只在两个最高情感浓度的场景出现（书房发现信、阳台承诺陪他回家）。如果在 1_1 咖啡厅或 4_1 便利店加入歌曲引用，会稀释它的特殊性。p08 的结论验证了这一点——对于低 weight 母题，"克制"可能是最优的改进方向。
      - 两首歌的功能不同：《夜与昼》出现在她看到他内心的裂缝之后（信），是共鸣；《Falling You》出现在她说出要陪他回去之后，是承诺。歌声不是随机插入的BGM，它标记的是"说出无法用日常语言表达的话"的时刻。