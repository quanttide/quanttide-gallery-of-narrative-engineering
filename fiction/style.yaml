# 量潮叙事工程 · 风格模型
# 基于都市言情与校园言情共同风格提炼

title: 温暖日常
description: 日常的深情叙事。淡而有味，缓而有深。无论都市还是校园，都在写"两个善良的人在日常生活中缓慢靠近"这一件事。

dimensions:
  - title: 总体风格定位
    description: 日常的深情叙事。不走浓烈狗血路线，不依赖激烈冲突，而是在日常生活的缝隙中安放深情。无论是都市的"十年暗恋"还是校园的"论坛邂逅"，情感内核相同：善良的人在日常生活中缓慢靠近。
    confidence: 0.95
    clues:
      - 两部小说都没有第三者、没有误会、没有家庭反对
      - 冲突全部来自"不敢说"而非"不想给"
      - 情感推动力来自善意和共情，而非情节突转

  - title: 情感表达
    description: 动作先于语言，手势比告白更诚实。伸出去又缩回的手、掏口袋找纸巾、拿起毛巾擦头发——编辑本人可能没有意识到，但ta只有一种表达深情的方式，那就是让手先于理性行动。同时，情感最终会被言语摊开——"我喜欢你""我愿意"在关键节点出现，不回避直球。
    confidence: 0.95
    clues:
      - 都市：毛巾（擦头发→回神→缩回）和公园拥抱（抱住→僵直→抬起手→抱紧）
      - 校园：纸巾（掏口袋→拆开→擦上去→心神一荡→不敢再靠近）
      - 最终都会说出口，但最动人的时刻发生在说出之前

  - title: 人物塑造
    description: 温和的善良人。男女主角普遍具备以下特质：为对方着想多于为自己、有各自的事业和生活（不恋爱脑）、善良但不软弱、有独立的性格缺陷（都市：过分克制；校园：过分礼貌）。没有反派，没有恶人，让读者安心。
    confidence: 0.90
    clues:
      - 都市：林远亭深情但不苦情，陆知微勇敢但不逼迫
      - 校园：窦逸负责但不霸道，林栀敏锐但不咄咄逼人
      - 双方都抢着承担：都市的"如果我当时走过去该多好"和校园的"你保护过我，这次换我保护你"

  - title: 语言风格
    description: 干净、日常、有温度。句式偏短，用词日常化，不堆砌辞藻。对话自然接近口语，有弹性——深情段落偏书面，互动段落偏轻快。偶尔出现带文学色彩的句子，但克制使用。
    confidence: 0.85
    clues:
      - 都市："他就这样孤独地遥望了她十年"——偶尔文学色彩
      - 都市："黑心资本家！"——互动段落轻快
      - 校园："你的眼里有光，天真和成熟在纠缠着跳舞呢"——偶尔文学色彩
      - 校园："好啦！我回去整理一下"——语气词丰富
      - 两本小说的对话都有留白，不愿意把话说满

  - title: 叙事视角
    description: 第三人称，双视角交替。两本小说都采用双视角，让读者同时看到两个人的内心。都市言情严格遵循"第三人称限知"，叙事者不跳出来评论；校园言情偶尔插入旁白注释，叙事距离更近。但共同点是：没有单向的暗恋，读者永远知道"他也喜欢她"。
    confidence: 0.85
    clues:
      - 都市：第三人称限知，情感通过言行和细节呈现
      - 校园：第三人称全知，叙事者偶尔直接解读人物动机
      - 都是"他知道她不知道他知道"的经典错位结构

  - title: 细节美学
    description: 日常物件承载情感。两本小说共享同一个模式：情感不通过宏大叙事传达，而是绑定在毛巾、纸巾、外套、活页纸、酸梅汤、果粒橙这些日常物件上。都市的物件跨场景复现（星标相簿、白衬衣），校园的物件功能性强（推动情节），但核心手法一致：细节即是情感。
    confidence: 0.85
    clues:
      - 都市：毛巾、星标相簿、白衬衣、活页纸、果粒橙——跨场景复现
      - 校园：纸巾、外套、酸梅汤、表情包——功能性承载
      - 共享同一个手法：用一个物件说说不出口的话

  - title: 整体美学
    description: 温暖、日常、克制、双向、遗憾、陪伴。不追求强烈的戏剧冲突，而是在日常的缝隙中安放深情。让读者感到"被看见"而非"被震撼"。
    confidence: 0.90
    clues:
      - 没有一场"大雨中分手"或"机场追回"的经典戏剧场景
      - 最动人的时刻往往是最安静的时刻：递毛巾、一起写声明、披外套、拥抱
      - 爱不是被宣告的，是在日常中渗透出来的
