# 量潮叙事工程 · 风格模型
# 基于《咖啡厅重逢》系列提炼
# 版本: 1, 样本数: 1

model:
  author: 林远亭 / 陆知微
  version: 1
  sample_count: 1
  summary: "克制的浪漫主义，日常的深情叙事。淡而有味，缓而有深。"

dimensions:
  - name: 总体风格定位
    value: 克制的浪漫主义，日常的深情叙事
    confidence: 0.95
    evidence:
      - 小说表面写都市男女相遇，内核是漫长的暗恋与迟到的双向奔赴
      - 不走浓烈狗血路线，不依赖激烈冲突
      - 用细腻的日常细节、克制的情绪流露、时间维度上的厚重感打动读者

  - name: 叙事视角
    value: 第三人称限知，双视角交替
    confidence: 0.90
    evidence:
      - 关键场景切换视角，咖啡厅重逢中先写他的日记、再写她的思绪、最后交汇于偶遇
      - 叙事者很少跳出来评论，情感通过言行、心理独白和细节呈现
    contradictions:
      - 书房场景偶尔短暂跳出到全知视角交代背景

  - name: 时间结构
    value: 过去与现在交织，核心锚点是"十年"
    confidence: 0.90
    evidence:
      - 当下场景中频繁闪回过去：酒吧里回忆大四老乡会、咖啡厅里想起十年前
      - 通过日记、信件、照片、朋友转述等"二手文本"承载回忆
      - "十年"是反复出现的情感锚点

  - name: 语言风格
    value: 干净、克制、略带文艺感，但有弹性
    confidence: 0.85
    evidence:
      - 句式偏短，少用冗长的复合句
      - 用词日常化，不堆砌辞藻，但偶尔出现文学色彩句子
      - "动作即语言"——他删掉"从没有人"换成"少有人"，修改动作本身揭示性格
    contradictions:
      - 互动段落偏轻快（颜文字、网络化表达），与深情底色有轻微违和

  - name: 情感表达
    value: 重含蓄、轻直露，以"未说出口"与"终于说出口"制造张力
    confidence: 0.90
    evidence:
      - 大部分时间情感压住：他暗恋十年不敢表白
      - 关键节点释放但不过度煽情：动作或简短重复代替长篇告白
      - 最高级情感在细微处：递毛巾、整理书桌、旁听会议

  - name: 细节美学
    value: 具体、可感、能成为情感符号
    confidence: 0.90
    evidence:
      - 每个重要情感节点都绑定具体物或动作：果粒橙、白衬衣、焦糖玛奇朵、星标相簿
      - 细节在不同场景反复出现，形成内部呼应

  - name: 人物塑造
    value: 通过自我修正和错过的遗憾建立深度
    confidence: 0.85
    evidence:
      - 林远亭：对自己极度诚实、羞于自怜、深情但不苦情
      - 陆知微：深情但更勇敢，"如果我当时走过去该多好"
      - 两人有各自的事业和生活，暗恋只是人生的一部分

  - name: 叙事节奏
    value: 舒缓但有内在驱动力
    confidence: 0.80
    evidence:
      - 场景多为静态室内，外部动作少，内心活动多
      - 驱动故事的是情绪积累与释放，而非情节突转
      - 情感悬念替代情节悬念

  - name: 流行文化嵌入
    value: 有机嵌入，标记时代背景
    confidence: 0.70
    evidence:
      - 周杰伦歌词、都智文《夜与昼》、小爱同学
      - 颜文字和网络用语增强都市感

  - name: 整体美学
    value: 克制、深情、细节、时间、双向、遗憾、陪伴、日常、温柔、诚实
    confidence: 0.95
    evidence:
      - 十个关键词贯穿所有场景和人物行为

signature:
  pov: third_limited                    # first_person / third_limited / third_omniscient
  tense: past                            # past / present
  paragraph_avg_len: 120                 # 平均段落长度（字符）
  dialog_ratio: 0.35                     # 对话占比
  flashback_ratio: 0.25                  # 闪回占比
  vocabulary_richness: 0.72              # 词汇丰富度
  emotion_tone: restrained_warm          # restrained / warm / intense
  common_phrases:
    - "十年"
    - "如果当时"
    - "忘不了"
    - "舍不得"
    - "回过神来"
  sentence_starters:
    - "他"
    - "她"
    - "那是"
    - "窗外的"
    - "不知不觉"

exemplars:
  - paragraph: |-
      他删掉了"从没有人"，换成了"少有人"。
      就这一个词的改动，他反复看了三遍。
      然后合上日记本，把它放回书架最上层。
    dimension: 语言风格
    note: 动作即语言的典型——修改动作本身成为人物性格的揭示

  - paragraph: |-
      她想要推门的手顿住了。真的是他。
      滑轮的声音摩擦着地面。她轻轻推开了咖啡店的门。
      听到门口的声响，他本能地转过头。
      看到眼前窈窕的身影，他愣住了。
      不是梦。
    dimension: 叙事视角
    note: 双视角交替——先写她的手，再写他的眼，最后交汇于同一刻

  - paragraph: |-
      他看了看她湿漉漉的头发，从书包里掏出刚在超市买的毛巾。
      不知不觉间，他的手已经伸了出去，轻轻地擦了擦她的头发。
      擦了两下，他回过神来。赶忙停下来，把毛巾递给她。
    dimension: 情感表达
    note: 最高级的情感藏在细微动作里，不需要一句"我喜欢你"

  - paragraph: |-
      那是他存了十年的照片。
      他看着窗外时下时停的雨。透过去，他看到了十年前自己在雨中见过的她的背影。
    dimension: 时间结构
    note: 一张照片、一场雨，连接两个时空——"十年"的具象化
