# 量潮叙事工程 · 母题模型
# 基于校园言情「校园轻甜」风格提炼

title: 公共空间的暧昧
description: 五个母题共同指向一个核心：这场恋爱发生在所有人的注视之下。论坛、朋友、CP粉——故事不只是两个人的事，而是一场公开表演。每个母题都在描述"被看见"的方式。

motifs:
  - title: 帖子
    description: 论坛帖子贯穿全书——事件因帖子而起，关系通过帖子推进，最终由联合声明帖子收束。帖子的评论区、照片楼、修改记录成为叙事的有机组成部分。
    weight: 10

  - title: 协作书写
    description: 他们联结的方式不是肢体接触，而是共同写字。联合声明是最重要的场景——他搭框架，她润色温度。屏幕上的协作比面对面的对话更亲密，因为文字可以被反复审视、修改、确认。
    weight: 9

  - title: 旁观者
    description: CP粉、室友、闺蜜、好友——故事很大程度上通过旁观者的眼睛被讲述。"眼神拉丝了""铁树开花""智性恋天花板"——朋友们的起哄和解读比当事人自己的表达更直白。故事不只是在发生，还在被围观和诠释。
    weight: 8

  - title: 纸巾
    description: 与都市言情的"毛巾"形成镜像——他掏了四五个口袋找到纸包，"鬼使神差地已经擦了上去"。同一只手势结构：犹豫→无意识动作→回过神→不敢再靠近。但场景从雨天的咖啡厅换成了雪天的校园，人物从职场精英换成大学生。
    weight: 7

  - title: 心疼
    description: 全书的情绪关键词。"我当时就很心疼你"——这是他说出最接近告白的话。不是"喜欢了十年"，而是"我心疼你活得太累"。校园言情的感情逻辑是共情式的——爱不是漫长的压抑和爆发，而是在理解对方的疲惫时悄然发生。
    weight: 9
