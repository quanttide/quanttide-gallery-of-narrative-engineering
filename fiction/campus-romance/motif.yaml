# 量潮叙事工程 · 母题模型
# 基于校园言情「校园轻甜」风格提炼

title: 公共空间的暧昧
description: 四个母题共同指向一个核心：这场恋爱发生在所有人的注视之下，也在最狭小的空间里完成。论坛、K歌房、校门口的面馆——故事既是一场公开表演，也是一次"终于只有两个人"的漫长等待。

motifs:
  - title: 论坛
    description: 论坛帖子贯穿全书。事件因帖子而起（医院偷拍），关系通过帖子推进（"有缘再见"的公开喊话），由联合声明帖子收束，最终以互关引爆全论坛。评论区、照片楼、CP粉团规成为叙事的有机组成部分。
    weight: 10

  - title: 协作书写
    description: 他们联结的核心方式不是肢体接触，而是一起写字。从论坛的隔空喊话，到共同编辑联合声明——他搭框架，她润色温度。屏幕上的协作比面对面的对话更亲密，因为文字可以被反复审视、修改、确认。第一章的"有缘再见"是第一次协作的种子——一个人说，一个人接。
    weight: 9

  - title: 旁观者
    description: CP粉、室友、闺蜜、论坛路人——故事很大程度上通过旁观者的眼睛被讲述。"眼神拉丝了""铁树开花""智性恋天花板""锦旗CP"——朋友们的起哄和解读比当事人自己的表达更直白。第六章中闺蜜们的三堂会审式追问，本质上是在替读者确认"这是真的吗"。故事不只是在发生，还在被围观和诠释。
    weight: 8

  - title: 随身携带的温柔
    description: 他掏了四五个口袋找到纸巾，他随身带着外套。Chapter 1的纸巾和Chapter 10的外套共享同一手动作结构——在对方需要的时候恰好准备着。这不是巧合，而是人物性格的横截面：他是一个随时准备好照顾别人的人。与都市言情中"超市新买的毛巾"形成跨作品镜像。
    weight: 6
