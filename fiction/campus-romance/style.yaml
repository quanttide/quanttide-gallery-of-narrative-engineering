# 量潮叙事工程 · 风格模型
# 基于校园言情系列提炼

name: campus-romance
title: 校园轻甜
description: 轻快的双向奔赴，学生气的直球暧昧。温柔、礼貌、明快。

dimensions:
  - title: 总体风格定位
    description: 走的是"误会→接触→心动→表白"的经典校园路线，情感明快不压抑。故事由论坛风波驱动（医院偷拍→隔空喊话→联合声明→互关），在公开注视和私下靠近之间交替推进。没有漫长的暗恋，一切都正在发生。
    confidence: 0.90
    clues:
      - 以十字路口的惊鸿一瞥开场，以论坛互关和KTV表白收束
      - 情感推动力来自善意和责任感而非长久的压抑
      - 没有回忆闪回，全部是"现在进行时"

  - title: 叙事视角
    description: 第三人称全知为主，叙事者会直接评论人物心理。大量使用"她感觉""他愣愣地""她的脸似乎又红了一点"等直接心理描写。偶尔插入旁白注释，如"这是一种优雅的主动，将选择权递到他手中"，拉近了叙事者与读者的距离。
    confidence: 0.90
    clues:
      - |-
        "她感觉心跳平复下来，一种安稳的喜悦慢慢升起"——直接说情绪
      - |-
        "（她不再用疑问句'方便加吗'，而是直接陈述一个事实）"——旁白注释体
      - 叙事者不忌讳跳出来解读人物的行为动机

  - title: 时间结构
    description: 线性推进，没有回忆闪回。从第一章医院相遇，到第二章论坛发酵，到第四章加微信，到第五章吃火锅写声明，到第十章KTV表白。叙事跨度约一周，节奏明快，没有"十年"这类厚重的情感锚点。
    confidence: 0.85
    clues:
      - 第一章医院初遇，第二章论坛发酵
      - 第四章加微信，第五章吃火锅，第十章KTV表白
      - 没有倒叙、没有"二手文本"（日记/信件/照片）
      - 时间厚度弱，但节奏明快

  - title: 语言风格
    description: 句式活泼，大量口语和语气词——"啦""呀""呢""好""妙啊"高频出现。对话占比很高，推动情节和关系发展。旁白注释体类似剧本写法，在小说中有一定的间离感。整体偏轻快，但关键场景（KTV表白、披外套）有温柔沉淀的时刻。
    confidence: 0.85
    clues:
      - |-
        "好啦！我回去整理一下，发之前给你再看一遍。"——语气词丰富
      - |-
        "这位在危机公关方面是专业的新传人，请你开始表演吧。"——对话活泼
      - |-
        "你的眼里有光，天真和成熟在纠缠着跳舞呢。"——偶尔有带文学色彩的句子
      - 没有颜文字，没有特别克制的留白
    tensions:
      - 旁白注释体（括号说明文字）与纯小说叙事有风格张力——这是有意为之的叙事特征而非缺陷

  - title: 情感表达
    description: 半直球路线。心动通过微动作表达（掏纸巾擦眼泪、披外套、扣扣子），但最终靠言语摊开——"我喜欢你，我们在一起吧""好呀"。没有漫长的压抑，心动就靠近，靠近就行动。但也有欲说还休的时刻："心里的那句'我喜欢你'想了几次又咽进去"。
    confidence: 0.85
    clues:
      - |-
        "其实是想问'能不能加个微信方便答谢'，结果脑子一空，说出口就变成了'有缘再见'"——欲说还休
      - |-
        "他把她向前轻轻拉进自己怀里，声音有些颤抖：'这样还冷吗？'"——动作先于语言
      - |-
        "他掏了四五个口袋，总算找到一包纸巾拆开。鬼使神差地已经擦了上去。"——无意识动作
      - |-
        "我喜欢你，我们在一起吧。"——最终靠言语摊开

  - title: 细节美学
    description: 细节功能性较强，服务于情节推进和情感承载。纸巾（第一章）和外套（第十章）跨章节呼应，形成情感符号——"随身携带的温柔"是全书最有力的细节母题。论坛帖子的评论区、KTV的歌单、校门口的面馆也承担了空间标记的功能。
    confidence: 0.80
    clues:
      - 纸巾：第一章掏了四五个口袋找到的纸包，与都市的"毛巾"形成镜像
      - 外套：第十章随身带的牛仔外套，披上以后"有点像披上战甲"
      - |-
        "她的眼睛还是亮晶晶的"——视觉细节重复出现
      - 没有"星标相簿""白衬衣"这类跨场景复现的物件

  - title: 人物塑造
    description: 通过善意和责任感建立好感——"你保护过我，这次换我保护你"。两人都礼貌、温柔、为对方着想。没有复杂的内心挣扎，没有长期的压抑和自我怀疑。是校园式的纯真和体面。
    confidence: 0.85
    clues:
      - |-
        "可是你没有任何错啊"——双方都抢着承担
      - |-
        "我有点高估了我在学校的知名度"——带点自嘲的坦诚
      - 两人都没有深层的性格阴影

  - title: 叙事节奏
    description: 事件驱动。医院初遇→论坛发酵→偷拍曝光→加微信→约饭写声明→CP粉狂欢→KTV表白，外部情节和论坛叙事交替推进。节奏明快，非论坛段落（KTV、校门口）有安静的沉淀空间。
    confidence: 0.85
    clues:
      - 第一章完成初遇，第二章完成论坛发酵
      - 第五章完整覆盖一顿饭和一篇声明
      - 第十章完成KTV到表白的全过程
      - 论坛段落快节奏，KTV段落慢节奏

  - title: 流行文化嵌入
    description: 许嵩、徐良、汪苏泷作为选歌出现，《悲伤的李白》《河山大好》标记了九零后/零零后的青春记忆。KTV自助歌房作为场景，承担了"狭小空间里的亲密"的功能。论坛、微信、表情包是叙事工具。
    confidence: 0.85
    clues:
      - |-
        "点一个《悲伤的李白》。我喜欢这个国风。"——具体歌曲名
      - |-
        "河山大好，出去走走～～～"——歌词嵌入对话
      - 许嵩、徐良、汪苏泷——三位歌手本身就是时代的标记
      - 没有都智文、小爱同学等智能设备元素

  - title: 整体美学
    description: 温柔、礼貌、明快、学生气、事件驱动、半直球、CP粉见证。不追求长时间的压抑与释放，而是在短时间跨度内通过论坛叙事和日常场景推进关系。有"随身携带的温柔"作为贯穿的细腻手势。
    confidence: 0.90
    clues:
      - 整部作品没有超过两周的时间跨度
      - 对话主导，情节推进快
      - 没有沉重的心理负担
      - CP粉文化作为叙事的有机组成部分

excerpts:
  - paragraph: |-
      他看着她如同孩子般的笑容，心里却有点泛酸。
      他看她反常地默不作声，悄悄地安静下来。
      "我时常会觉得自己的心里像一个巨大又空旷的仓库，里面堆积的瓶瓶罐罐里收集了很多人的故事，却怎么也填不满。"
    dimension: 人物塑造
    note: 校园里少有的内心独白——瓶瓶罐罐的比喻是全书最有重量的情感表达

  - paragraph: |-
      逸神："林栀同学，抱歉。我没想到随手发的帖子会引发这么多关注……希望没有给你带来困扰。"
      逸神："另外，你的脚踝……好些了吗？"
      林栀 看着屏幕上那句"一直惦记着"，心尖像是被羽毛轻轻挠了一下。
    dimension: 情感表达
    note: 半直球——"脚踝好些了吗"的关切里带着暧昧，不说破但能感受到

  - paragraph: |-
      林栀："其实是想问'能不能加个微信方便答谢'，结果脑子一空，说出口就变成了'有缘再见'……"
      林栀："所以，为了表达我的歉意和……嗯，还有正式的感谢，让我请你吃顿饭吧？"
      几乎是在消息变为已读的瞬间，他的回复就跳了出来。
      逸神："好！"
    dimension: 语言风格
    note: 欲说还休——"让我请你吃顿饭吧"是校园式的直球，但前面铺垫了一整段心理活动

  - paragraph: |-
      "论坛的声明我来写吧。"他开口了，"这次的风波是因为我的帖子而起，我应该对此负责的。"
      "可是你没有任何错啊。"她急忙打断了他，"这次风波从头到尾都没有任何人有错。"
    dimension: 人物塑造
    note: 双向善意——两人都抢着承担责任，这是校园式纯真的核心

  - paragraph: |-
      他把外套披在她身上。"这样有点像披上战甲耶！"他正在尝试把最上面的一颗扣子扣起来。
      "你的眼里有光"，她望着他眼里路灯的倒影，"天真和成熟在纠缠着跳舞呢。"
      他的手停住了，怔怔地看着望着她右脸的酒窝。
      他把她向前轻轻拉进自己怀里，声音有些颤抖，"这样还冷吗？"
      "不冷啦～"她伸手环住他的腰。
    dimension: 情感表达
    note: 披外套→扣扣子→拉进怀里——一连串动作完成了从关怀到表白的递进，校园版的"动作即语言"

  - paragraph: |-
      发完那条"粉丝狂喜"的帖子后，窦逸感觉自己的心脏还在砰砰直跳。他做贼似的在论坛搜索栏里输入了"林栀"两个字，点进那个公认的账号，主页干净又好看。他深吸一口气，屏住呼吸点击了"关注"按钮。
      几乎是在他退回首页的下一秒，一条系统提示弹了出来：
      "林栀"也关注了你。
    dimension: 叙事节奏
    note: 论坛场景的快节奏画风——公共空间的暧昧最极致的体现

  - paragraph: |-
      "对不起"，过了一会儿，他还是没有松开她，"我应该先表白的。"
      "那…你快表白吧。"她依然丝毫没松手。
      "我喜欢你，我们在一起吧。"
      "好呀。"
    dimension: 语言风格
    note: 全书写得最轻也最重的四句对话——没有铺垫，没有修辞，最直接的告白
