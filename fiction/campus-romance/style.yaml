name: campus-romance
title: 校园轻甜
description: 轻快的双向奔赴，学生气的直球暧昧。温柔、礼貌、明快。
styles:
- title: 总体风格定位
  description: 走的是"误会→接触→心动→表白"的经典校园路线，情感明快不压抑。故事由论坛风波驱动（医院偷拍→隔空喊话→联合声明→互关），在公开注视和私下靠近之间交替推进。没有漫长的暗恋，一切都正在发生。
- title: 叙事视角
  description: 第三人称全知为主，叙事者会直接评论人物心理。大量使用"她感觉""他愣愣地""她的脸似乎又红了一点"等直接心理描写。偶尔插入旁白注释，如"这是一种优雅的主动，将选择权递到他手中"，拉近了叙事者与读者的距离。
- title: 时间结构
  description: 线性推进，没有回忆闪回。从第一章医院相遇，到第二章论坛发酵，到第四章加微信，到第五章吃火锅写声明，到第十章KTV表白。叙事跨度约一周，节奏明快，没有"十年"这类厚重的情感锚点。
- title: 语言风格
  description: 句式活泼，大量口语和语气词——"啦""呀""呢""好""妙啊"高频出现。对话占比很高，推动情节和关系发展。旁白注释体类似剧本写法，在小说中有一定的间离感。整体偏轻快，但关键场景（KTV表白、披外套）有温柔沉淀的时刻。
- title: 情感表达
  description: 半直球路线。心动通过微动作表达（掏纸巾擦眼泪、披外套、扣扣子），但最终靠言语摊开——"我喜欢你，我们在一起吧""好呀"。没有漫长的压抑，心动就靠近，靠近就行动。但也有欲说还休的时刻："心里的那句'我喜欢你'想了几次又咽进去"。
- title: 细节美学
  description: 细节功能性较强，服务于情节推进和情感承载。纸巾（第一章）和外套（第十章）跨章节呼应，形成情感符号——"随身携带的温柔"是全书最有力的细节母题。论坛帖子的评论区、KTV的歌单、校门口的面馆也承担了空间标记的功能。
- title: 人物塑造
  description: 通过善意和责任感建立好感——"你保护过我，这次换我保护你"。两人都礼貌、温柔、为对方着想。没有复杂的内心挣扎，没有长期的压抑和自我怀疑。是校园式的纯真和体面。
- title: 叙事节奏
  description: 事件驱动。医院初遇→论坛发酵→偷拍曝光→加微信→约饭写声明→CP粉狂欢→KTV表白，外部情节和论坛叙事交替推进。节奏明快，非论坛段落（KTV、校门口）有安静的沉淀空间。
- title: 流行文化嵌入
  description: 许嵩、徐良、汪苏泷作为选歌出现，《悲伤的李白》《河山大好》标记了九零后/零零后的青春记忆。KTV自助歌房作为场景，承担了"狭小空间里的亲密"的功能。论坛、微信、表情包是叙事工具。
- title: 整体美学
  description: 温柔、礼貌、明快、学生气、事件驱动、半直球、CP粉见证。不追求长时间的压抑与释放，而是在短时间跨度内通过论坛叙事和日常场景推进关系。有"随身携带的温柔"作为贯穿的细腻手势。
